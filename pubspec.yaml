name: diplom_messenger
description: "A functional Flutter project for diploma defense."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # API & Sockets
  http: ^1.2.0
  socket_io_client: ^3.1.0
  
  # State Management
  provider: ^6.1.2
  
  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  
  # Encryption & Crypto
  cryptography: ^2.7.0
  pointycastle: ^3.9.1
  
  # Utils
  mime: ^1.0.5
  http_parser: ^4.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
